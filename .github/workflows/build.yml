name: Build Unity VR Player

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      # 2. 缓存 Unity Library 目录
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: |
            unity_vr_player/Library
          key: Library-Android-${{ hashFiles('unity_vr_player/Packages/manifest.json', 'unity_vr_player/Packages/packages-lock.json') }}
          restore-keys: |
            Library-Android-

      # 3. 安装 Unity (使用 Unity Hub)
      - name: Install Unity
        uses: game-ci/unity-installer-action@v4
        with:
          unity-version: '2022.3.40f1'
          license: ${{ secrets.UNITY_LICENSE }}

      # 4. 构建 Android APK
      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        with:
          projectPath: unity_vr_player
          targetPlatform: Android
          androidAppBundle: false
          androidExportType: androidPackage
          androidKeyStoreName: keystore.keystore
          androidKeyStoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          buildName: VRVideoPlayer
          buildsPath: build
          versioning: Semantic

      # 5. 上传构建产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: VRVideoPlayer-Android-APK
          path: |
            build/Android/*.apk
          retention-days: 7

  build-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: |
            unity_vr_player/Library
          key: Library-Tests-${{ hashFiles('unity_vr_player/Packages/manifest.json') }}
          restore-keys: |
            Library-Tests-

      - name: Install Unity
        uses: game-ci/unity-installer-action@v4
        with:
          unity-version: '2022.3.40f1'
          license: ${{ secrets.UNITY_LICENSE }}

      - name: Run Unit Tests
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: unity_vr_player
          testMode: playmode
          artifactsPath: TestResults
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadges;generateAdditionalMetrics'

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results
          path: TestResults
          retention-days: 3
