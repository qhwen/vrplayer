name: Build Unity VR Player

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      # 2. 缓存 Unity Library 目录
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: |
            unity_vr_player/Library
          key: Library-Android-${{ hashFiles('unity_vr_player/Packages/manifest.json') }}
          restore-keys: |
            Library-Android-

      # 3. 使用 Unity Builder action（正确的方式）
      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity_vr_player
          targetPlatform: Android
          androidAppBundle: false
          androidExportType: androidPackage
          androidKeystoreName: keystore.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          buildName: VRVideoPlayer
          buildsPath: build
          versioning: Semantic
          allowDirtyBuild: true

      # 4. 上传构建产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: VRVideoPlayer-Android-APK
          path: |
            build/Android/*.apk
          retention-days: 7

      # 5. 上传构建日志
      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Unity-Build-Log
          path: |
            unity-build.log
          retention-days: 3
          if-no-files-found: warn
